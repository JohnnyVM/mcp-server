# SearchAgent benchmark configuration

llm:
  # OVH AI Endpoints — OpenAI-compatible API
  api_base: "https://endpoints.ai.cloud.ovh.net/api/openai/v1"
  api_key_env: "OVH_AI_TOKEN"          # env var holding the API key
  model: "Meta-Llama-3.1-70B-Instruct" # model available on your OVH endpoint

  # Embeddings (optional — required for faithfulness/answer_relevancy metrics)
  # Leave empty to skip embedding-based metrics
  embeddings_model: ""

mcp_server:
  binary: "../SearchAgent/searchagent-mcp"
  sources_file: "../SearchAgent/sources.json"

benchmark:
  top_k: 10               # number of results to retrieve per query
  fetch_timeout: 30       # seconds per fetch_content call
  ragas_metrics:          # which ragas metrics to run in content benchmark
    - context_precision   # are retrieved contexts relevant to the question?
    - context_recall      # does retrieved context cover the ground truth?
